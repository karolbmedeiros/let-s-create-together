<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ativuz Veículos · Painel de Gestão</title>
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/app.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/sidebar.jsx"></script>
<script type="text/babel" src="src/login.jsx"></script>
<script type="text/babel" src="src/pages.jsx"></script>

<script type="text/babel">
// ─────────────────────────────────────────────────────────────
// ATIVUZ · App root
// ─────────────────────────────────────────────────────────────

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "spacious",
  "sidebarVariant": "dark"
}/*EDITMODE-END*/;

const PAGE_TITLES = {
  dashboard: ['Principal', 'Página Inicial'],
  templates: ['Contratos', 'Templates'],
  criar:     ['Contratos', 'Criar Contratos'],
  contratos: ['Contratos', 'Histórico de Contratos'],
  loc:       ['Locação & Vistoria', 'Contrato Locação'],
  histloc:   ['Locação & Vistoria', 'Hist. Ct. Locação'],
  vistoria:  ['Locação & Vistoria', 'Vistoria'],
  histvist:  ['Locação & Vistoria', 'Hist. Vistorias'],
  inadimplencia: ['Financeiro', 'Inadimplência'],
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [logged, setLogged] = React.useState(false);
  const [page, setPage] = React.useState('dashboard');
  const [collapsed, setCollapsed] = React.useState(false);

  React.useEffect(() => {
    document.documentElement.setAttribute('data-density', t.density);
  }, [t.density]);

  if (!logged) {
    return (
      <>
        <Login onLogin={() => setLogged(true)} />
        <TweaksPanel title="Tweaks">
          <TweakSection label="Densidade" />
          <TweakRadio label="Espaçamento" value={t.density}
                      options={[{value:'compact',label:'Compacta'},{value:'comfy',label:'Confort.'},{value:'spacious',label:'Espaçosa'}]}
                      onChange={(v) => setTweak('density', v)} />
          <TweakSection label="Sidebar (após login)" />
          <TweakRadio label="Estilo" value={t.sidebarVariant}
                      options={[{value:'dark',label:'Escura'},{value:'light',label:'Clara'},{value:'orange',label:'Laranja'}]}
                      onChange={(v) => setTweak('sidebarVariant', v)} />
        </TweaksPanel>
      </>
    );
  }

  const [group, title] = PAGE_TITLES[page] || ['', ''];

  const renderPage = () => {
    switch (page) {
      case 'dashboard':    return <DashboardPage />;
      case 'contratos':    return <ContratosPage />;
      case 'vistoria':     return <VistoriaPage />;
      case 'inadimplencia':return <InadimplenciaPage />;
      case 'templates':    return <EmptyPage title="Templates" desc="Modelos de contratos reutilizáveis" icon={IconTemplates}/>;
      case 'criar':        return <EmptyPage title="Criar Contrato" desc="Novo contrato a partir de template" icon={IconFilePlus}/>;
      case 'loc':          return <EmptyPage title="Contrato de Locação" desc="Edição do contrato de locação corrente" icon={IconFile}/>;
      case 'histloc':      return <EmptyPage title="Histórico de Contratos de Locação" desc="Filtrar por cliente, período, frota" icon={IconFileText}/>;
      case 'histvist':     return <EmptyPage title="Histórico de Vistorias" desc="Todas as vistorias realizadas" icon={IconArchive}/>;
      default:             return <DashboardPage />;
    }
  };

  return (
    <div className="app" data-sidebar={collapsed ? 'collapsed' : 'expanded'}>
      <Sidebar
        active={page}
        onNavigate={setPage}
        variant={t.sidebarVariant}
        collapsed={collapsed}
        onToggleCollapse={() => setCollapsed(c => !c)}
        onLogout={() => setLogged(false)}
      />
      <div className="main">
        <header className="topbar">
          {collapsed && (
            <button className="icon-btn" onClick={() => setCollapsed(false)} aria-label="Expandir menu">
              <IconPanelLeft size={16}/>
            </button>
          )}
          <div className="crumbs">
            <span>{group}</span>
            <span className="sep">/</span>
            <span className="current">{title}</span>
          </div>
          <div className="search">
            <IconSearch size={16}/>
            <input placeholder="Buscar contratos, clientes, placas…" />
            <span className="kbd">⌘K</span>
          </div>
          <div className="actions">
            <button className="icon-btn" aria-label="Ajuda"><IconHelp size={18}/></button>
            <button className="icon-btn" aria-label="Notificações"><IconBell size={18}/><span className="dot"/></button>
            <button className="icon-btn" aria-label="Configurações"><IconSettings size={18}/></button>
          </div>
        </header>
        {renderPage()}
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Densidade" />
        <TweakRadio label="Espaçamento" value={t.density}
                    options={[{value:'compact',label:'Compacta'},{value:'comfy',label:'Confort.'},{value:'spacious',label:'Espaçosa'}]}
                    onChange={(v) => setTweak('density', v)} />
        <TweakSection label="Sidebar" />
        <TweakRadio label="Estilo" value={t.sidebarVariant}
                    options={[{value:'dark',label:'Escura'},{value:'light',label:'Clara'},{value:'orange',label:'Laranja'}]}
                    onChange={(v) => setTweak('sidebarVariant', v)} />
        <TweakSection label="Layout" />
        <TweakToggle label="Sidebar recolhida" value={collapsed} onChange={setCollapsed} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
