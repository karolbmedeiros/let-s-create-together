{% extends "base.html" %}
{% block title %}Contrato de Locação — ATIVUZ{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Contrato de Locação 2026</h1>
  <p class="page-sub">Preencha os dados e gere o contrato em DOCX ou PDF</p>
</div>

<form action="{{ url_for('gerar_contrato_locacao_route') }}" method="post" id="form-contrato-locacao">

  <!-- ── Locatário ── -->
  <div class="card">
    <div class="card-header">
      <h2 class="card-title"><span class="section-pill pill-blue">Locatário</span></h2>
    </div>
    <div class="form-grid">
      <div class="form-group col-2">
        <label class="form-label">Nome completo</label>
        <input type="text" name="locatario_nome" class="form-input" placeholder="João da Silva">
      </div>
      <div class="form-group">
        <label class="form-label">RG</label>
        <input type="text" name="locatario_rg" class="form-input" placeholder="0.000.000">
      </div>
      <div class="form-group">
        <label class="form-label">CPF</label>
        <input type="text" name="locatario_cpf" class="form-input" placeholder="000.000.000-00">
      </div>
      <div class="form-group col-2">
        <label class="form-label">Endereço</label>
        <input type="text" name="locatario_endereco" class="form-input"
               placeholder="Rua Exemplo, 123, Bairro, Natal/RN">
      </div>
      <div class="form-group">
        <label class="form-label">CEP</label>
        <input type="text" name="locatario_cep" class="form-input" placeholder="59000-000">
      </div>
      <div class="form-group">
        <label class="form-label">Telefone / WhatsApp</label>
        <input type="text" name="locatario_telefone" class="form-input" placeholder="(84) 99999-9999">
      </div>
    </div>
  </div>

  <!-- ── Avalista ── -->
  <div class="card">
    <div class="card-header">
      <h2 class="card-title"><span class="section-pill pill-green">Avalista</span></h2>
    </div>
    <div class="form-grid">
      <div class="form-group col-2">
        <label class="form-label">Nome completo</label>
        <input type="text" name="avalista_nome" class="form-input" placeholder="Maria da Silva">
      </div>
      <div class="form-group">
        <label class="form-label">CPF</label>
        <input type="text" name="avalista_cpf" class="form-input" placeholder="000.000.000-00">
      </div>
      <div class="form-group">
        <label class="form-label">Telefone</label>
        <input type="text" name="avalista_telefone" class="form-input" placeholder="(84) 99999-9999">
      </div>
      <div class="form-group col-2">
        <label class="form-label">Endereço</label>
        <input type="text" name="avalista_endereco" class="form-input"
               placeholder="Rua Exemplo, 456, Bairro, Natal/RN">
      </div>
    </div>
  </div>

  <!-- ── Veículo ── -->
  <div class="card">
    <div class="card-header">
      <h2 class="card-title"><span class="section-pill pill-teal">Veículo</span></h2>
    </div>
    <div class="form-grid">
      <div class="form-group col-2">
        <label class="form-label">Descrição</label>
        <input type="text" name="veiculo_descricao" class="form-input" placeholder="Carro de passeio">
      </div>
      <div class="form-group">
        <label class="form-label">Marca</label>
        <input type="text" name="veiculo_marca" class="form-input" placeholder="Chevrolet">
      </div>
      <div class="form-group">
        <label class="form-label">Modelo</label>
        <input type="text" name="veiculo_modelo" class="form-input" placeholder="Onix">
      </div>
      <div class="form-group">
        <label class="form-label">Ano</label>
        <input type="text" name="veiculo_ano" class="form-input" placeholder="2022">
      </div>
      <div class="form-group">
        <label class="form-label">Cor</label>
        <input type="text" name="veiculo_cor" class="form-input" placeholder="Prata">
      </div>
      <div class="form-group">
        <label class="form-label">Placa</label>
        <input type="text" name="veiculo_placa" class="form-input" placeholder="ABC1D23"
               style="text-transform:uppercase">
      </div>
      <div class="form-group col-2">
        <label class="form-label">N° Chassi</label>
        <input type="text" name="veiculo_chassi" class="form-input" placeholder="9BD158476N0123456">
      </div>
      <div class="form-group col-2">
        <label class="form-label">N° Motor</label>
        <input type="text" name="veiculo_motor" class="form-input" placeholder="131A1000000">
      </div>
    </div>
  </div>

  <!-- ── Condições ── -->
  <div class="card">
    <div class="card-header">
      <h2 class="card-title"><span class="section-pill pill-orange">Condições do Contrato</span></h2>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Início da Locação</label>
        <input type="text" name="contrato_inicio" class="form-input" placeholder="19/04/2026">
      </div>
      <div class="form-group">
        <label class="form-label">Duração</label>
        <input type="text" name="contrato_duracao" class="form-input" placeholder="90 dias">
      </div>
      <div class="form-group">
        <label class="form-label">Valor Semanal (R$)</label>
        <input type="text" name="valor_semanal" class="form-input" placeholder="350,00">
      </div>
    </div>
  </div>

  <!-- ── Assinatura e Testemunhas ── -->
  <div class="card">
    <div class="card-header">
      <h2 class="card-title"><span class="section-pill pill-purple">Assinatura e Testemunhas</span></h2>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Dia</label>
        <input type="text" name="data_dia" class="form-input" value="{{ defaults.data_dia }}">
      </div>
      <div class="form-group">
        <label class="form-label">Mês (por extenso)</label>
        <input type="text" name="data_mes" class="form-input" value="{{ defaults.data_mes }}">
      </div>
      <div class="form-group">
        <label class="form-label">Ano</label>
        <input type="text" name="data_ano" class="form-input" value="{{ defaults.data_ano }}">
      </div>

      <div class="form-group col-2" style="margin-top:0.5rem">
        <label class="form-label">Testemunha 1 — Nome</label>
        <input type="text" name="testemunha1_nome" class="form-input" placeholder="Nome completo">
      </div>
      <div class="form-group">
        <label class="form-label">Testemunha 1 — RG</label>
        <input type="text" name="testemunha1_rg" class="form-input" placeholder="0.000.000">
      </div>
      <div class="form-group">
        <label class="form-label">Testemunha 1 — CPF</label>
        <input type="text" name="testemunha1_cpf" class="form-input" placeholder="000.000.000-00">
      </div>

      <div class="form-group col-2">
        <label class="form-label">Testemunha 2 — Nome</label>
        <input type="text" name="testemunha2_nome" class="form-input" placeholder="Nome completo">
      </div>
      <div class="form-group">
        <label class="form-label">Testemunha 2 — RG</label>
        <input type="text" name="testemunha2_rg" class="form-input" placeholder="0.000.000">
      </div>
      <div class="form-group">
        <label class="form-label">Testemunha 2 — CPF</label>
        <input type="text" name="testemunha2_cpf" class="form-input" placeholder="000.000.000-00">
      </div>
    </div>
  </div>

  <!-- ── Ações ── -->
  <div class="form-actions">
    <button type="submit" name="formato" value="docx" class="btn btn-primary btn-lg">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
           viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/></svg>
      Gerar DOCX
    </button>
    <button type="submit" name="formato" value="pdf" class="btn btn-secondary btn-lg">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
           viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/></svg>
      Gerar PDF
    </button>
  </div>

</form>
{% endblock %}
