<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ATIVUZ — Contratos{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">&#9776;</span>
      <div>
        <span class="brand-name">ATIVUZ</span>
        <span class="brand-sub">Gestão de Contratos</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a href="{{ url_for('pagina_templates') }}"
         class="nav-item {% if active == 'templates' %}active{% endif %}">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
             viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/></svg>
        Templates
      </a>
      <a href="{{ url_for('pagina_gerar') }}"
         class="nav-item {% if active == 'gerar' %}active{% endif %}">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
             viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Gerar Contrato
      </a>
      <a href="{{ url_for('pagina_vistoria') }}"
         class="nav-item {% if active == 'vistoria' %}active{% endif %}">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
             viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M9 12l2 2 4-4"/></svg>
        Vistoria
      </a>
      <a href="{{ url_for('pagina_historico') }}"
         class="nav-item {% if active == 'historico' %}active{% endif %}">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"
             viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Histórico
      </a>
    </nav>

    <div class="sidebar-footer">v1.0</div>
  </aside>

  <!-- Toggle mobile -->
  <button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">
    &#9776;
  </button>

  <!-- Main content -->
  <main class="main">
    <div class="main-inner">

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">
            {{ message }}
            <button class="alert-close" onclick="this.parentElement.remove()">&#10005;</button>
          </div>
        {% endfor %}
      {% endwith %}

      {% block content %}{% endblock %}

    </div>
  </main>

</body>
</html>
